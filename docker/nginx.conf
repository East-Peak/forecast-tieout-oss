server {
    listen 8080;
    root /app/frontend/dist;
    index index.html;

    # Snapshot data - no cache
    location /data/ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Static assets - cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
